<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #140005;
            color: white;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
        }

        /* ================= LAYOUT ================= */
        .dashboard {
            display: flex;
            height: 100vh;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 220px;
            background: rgba(20, 0, 5, 0.95);
            padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .logo-text {
            color: #ff4d6d;
            margin-bottom: 40px;
            font-size: 26px;
        }

        .menu {
            list-style: none;
        }

        .menu li {
            padding: 12px 0;
            opacity: 0.7;
        }

        .menu a {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 10px 15px;
        }

        .menu li.active a {
            font-weight: bold;
            color: #ff4d4d;
        }

        .menu li a:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        /* ================= MAIN ================= */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* ================= TOPBAR ================= */
        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .topbar input {
            width: 300px;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #2b0a14;
            color: white;
        }

        .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
        }

        .profile-btn img {
            width: 24px;
        }


/* ===== BACK ===== */
.back {
    padding: 20px 40px;
}
.back a {
    color: #ff4d6d;
    text-decoration: none;
}

/* ===== CONTAINER ===== */
.container {
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* ===== TICKET CARD ===== */
.ticket {
    width: 800px;
    background: linear-gradient(135deg, #2b0a14, #1a0007);
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* LEFT SIDE */
.ticket-left {
    flex: 2;
    padding: 30px;
}

/* RIGHT SIDE */
.ticket-right {
    flex: 1;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* ===== MOVIE INFO ===== */
.movie-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
}

.meta {
    margin: 10px 0;
    opacity: 0.8;
}

/* ===== DETAILS ===== */
.details {
    margin-top: 20px;
}

.details p {
    margin: 8px 0;
}

/* ===== PRICE ===== */
.price {
    margin-top: 15px;
    font-size: 22px;
    color: #ff4d6d;
}

/* ===== QR ===== */
.qr {
    width: 140px;
    height: 140px;
    background: white;
    margin-bottom: 10px;
}

/* ===== BUTTONS ===== */
.actions {
    margin-top: 30px;
    display: flex;
    gap: 15px;
}

.btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn.cancel {
    background: #444;
    color: white;
}

.btn.receipt {
    background: linear-gradient(45deg, #800020, #ff4d6d);
    color: white;
}

.btn:hover {
    opacity: 0.85;
}

</style>
</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo-text">ARVR</h2>

            <ul class="menu">
                <li><a href="homepage.html">Home</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
                <li><a href="genres.html">Genres</a></li>
                <li><a href="coming-soon.html">Coming Soon</a></li>
                <li><a href="badges.html">Badges</a></li>
                <li  class="active"><a href="Ticket.html">My Tickets</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <input type="text" placeholder="Search movies...">
            <button class="profile-btn">
                <img src="profileIcon.jpg">
            </button>
        </div>


<div class="container">

    <div class="ticket">

        <!-- LEFT -->
        <div class="ticket-left">

            <h1 class="movie-title">Interstellar</h1>

            <div class="meta">
                ⭐ 8.7 | ⏱ 2h 49m
            </div>

            <div class="details">
                <p><strong>Date:</strong> 12 May 2026</p>
                <p><strong>Time:</strong> 4:00 PM</p>
                <p><strong>Seats:</strong> A3, A4</p>
                <p><strong>Hall:</strong> Hall 5</p>
                <p><strong>Booking ID:</strong> #ARVR10293</p>
            </div>

            <div class="price">
                Total Paid: RM 36.00
            </div>

            <!-- ACTIONS -->
            <div class="actions">
                <button class="btn cancel">Cancel Ticket</button>
                <button class="btn receipt">View Receipt</button>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="ticket-right">
            <div class="qr"></div>
            <p>Scan at entrance</p>
        </div>

    </div>

</div>

</body>
</html>
