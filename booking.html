<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Tickets</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #140005;
    color: white;
}

/* ===== BACK ===== */
.back {
    padding: 20px 40px;
}
.back a {
    color: #ff4d6d;
    text-decoration: none;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 40px 20px;
}

.header img {
    width: 80px;
    border-radius: 10px;
}

.header h1 {
    font-family: 'Playfair Display', serif;
}

/* ===== LAYOUT ===== */
.container {
    display: flex;
    gap: 40px;
    padding: 40px;
}

/* ===== LEFT ===== */
.left {
    flex: 2;
}

/* ===== SHOWTIMES ===== */
.showtimes {
    margin-bottom: 30px;
}

.times {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.time {
    padding: 10px 18px;
    border-radius: 10px;
    background: #2b0a14;
    cursor: pointer;
    transition: 0.3s;
}

.time:hover {
    background: #ff4d6d;
}

.time.active {
    background: #ff4d6d;
}

/* ===== SCREEN ===== */
.screen {
    text-align: center;
    margin: 20px 0;
    padding: 10px;
    background: #2b0a14;
    border-radius: 10px;
}

/* ===== SEATS ===== */
.seats {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 10px;
    justify-items: center;
}

.seat {
    width: 30px;
    height: 30px;
    background: #444;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.seat:hover {
    background: #ff4d6d;
}

.seat.selected {
    background: #ff4d6d;
}

.seat.occupied {
    background: #999;
    cursor: not-allowed;
}

/* ===== RIGHT ===== */
.right {
    flex: 1;
    background: #2b0a14;
    padding: 25px;
    border-radius: 15px;
    height: fit-content;
}

/* ===== SUMMARY ===== */
.summary h2 {
    margin-bottom: 15px;
}

.summary p {
    margin: 10px 0;
    opacity: 0.85;
}

/* ===== TOTAL ===== */
.total {
    margin-top: 20px;
    font-size: 20px;
    color: #ff4d6d;
}

/* ===== BUTTON ===== */
.book-btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #800020, #ff4d6d);
    color: white;
    cursor: pointer;
    font-size: 16px;
}

.book-btn:hover {
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="back">
    <a href="movie.html">← Back to Movie</a>
</div>

<!-- HEADER -->
<div class="header">
    <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">
    <div>
        <h1>Interstellar</h1>
        <p>⭐ 8.7 | 2h 49m</p>
    </div>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <!-- SHOWTIMES -->
        <div class="showtimes">
            <h2>Select Time</h2>

            <div class="times">
                <div class="time">10:00 AM</div>
                <div class="time">1:30 PM</div>
                <div class="time active">4:00 PM</div>
                <div class="time">7:30 PM</div>
                <div class="time">10:30 PM</div>
            </div>
        </div>

        <!-- SCREEN -->
        <div class="screen">SCREEN</div>

        <!-- SEATS -->
        <div class="seats" id="seats"></div>

    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="summary">
            <h2>Booking Summary</h2>

            <p>Movie: Interstellar</p>
            <p>Time: <span id="selectedTime">4:00 PM</span></p>
            <p>Seats: <span id="selectedSeats">0</span></p>

            <div class="total">
                Total: RM <span id="total">0</span>
            </div>

            <button class="book-btn">Proceed to Payment</button>
        </div>
    </div>

</div>

<script>

/* ===== GENERATE SEATS ===== */
const seatContainer = document.getElementById("seats");

for (let i = 0; i < 60; i++) {
    const seat = document.createElement("div");
    seat.classList.add("seat");

    // randomly mark some occupied ni bolrh coding lagi ikut database
    if (Math.random() < 0.2) {
        seat.classList.add("occupied");
    }

    seatContainer.appendChild(seat);
}

/* ===== SELECT SEATS ===== */
const seats = document.querySelectorAll(".seat:not(.occupied)");
const total = document.getElementById("total");
const count = document.getElementById("selectedSeats");

let ticketPrice = 18;

seats.forEach(seat => {
    seat.addEventListener("click", () => {
        seat.classList.toggle("selected");

        const selectedSeats = document.querySelectorAll(".seat.selected").length;

        count.innerText = selectedSeats;
        total.innerText = selectedSeats * ticketPrice;
    });
});

/* ===== SELECT TIME ===== */
const times = document.querySelectorAll(".time");
const selectedTime = document.getElementById("selectedTime");

times.forEach(t => {
    t.addEventListener("click", () => {
        times.forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        selectedTime.innerText = t.innerText;
    });
});

</script>

</body>
</html>
