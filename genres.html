<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genres - ARVR Cinema</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
        /* ================= RESET ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #140005;
            color: white;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
        }

        /* ================= LAYOUT ================= */
        .dashboard {
            display: flex;
            height: 100vh;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 220px;
            background: rgba(20, 0, 5, 0.95);
            padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .logo-text {
            color: #ff4d6d;
            margin-bottom: 40px;
            font-size: 26px;
        }

        .menu {
            list-style: none;
        }

        .menu li {
            padding: 12px 0;
            opacity: 0.7;
        }

        .menu a {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 10px 15px;
        }

        .menu li.active a {
            font-weight: bold;
            color: #ff4d4d;
        }

        .menu li a:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        /* ================= MAIN ================= */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* ================= TOPBAR ================= */
        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .topbar input {
            width: 300px;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #2b0a14;
            color: white;
        }

        .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
        }

        .profile-btn img {
            width: 24px;
        }

        /* ================= GENRE SECTION ================= */
        .genre-section {
            margin-bottom: 40px;
        }

        .genre-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ff4d6d;
        }

        /* ================= SCROLL WRAPPER ================= */
        .movie-row-wrapper {
            position: relative;
        }

        /* ================= MOVIE ROW ================= */
        .movie-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 40px;
            scroll-behavior: smooth;
        }

        .movie-row::-webkit-scrollbar {
            display: none;
        }

        /* ================= MOVIE CARD ================= */
        .movie-card {
            min-width: 160px;
            height: 240px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.08);
        }

        /* overlay */
        .movie-card::after {
            content: "Book Now";
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            opacity: 0;
            transition: 0.3s;
        }

        .movie-card:hover::after {
            opacity: 1;
        }

        .movie-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            opacity: 0;
            transition: 0.3s;
        }

        .movie-card:hover::before {
            opacity: 1;
        }

        /* ================= SCROLL BUTTONS ================= */
        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 26px;
            cursor: pointer;
            padding: 8px 12px;
            z-index: 10;
            opacity: 0.6;
            transition: 0.3s;
        }

        .movie-row-wrapper:hover .scroll-btn {
            opacity: 1;
        }

        .scroll-btn.left { left: 0; }
        .scroll-btn.right { right: 0; }

        </style>
        </head>

        <body>

        <div class="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo-text">ARVR</h2>

            <ul class="menu">
                <li><a href="homepage.html">Home</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
                <li class="active"><a href="genres.html">Genres</a></li>
                <li><a href="coming-soon.html">Coming Soon</a></li>
                <li><a href="badges.html">Badges</a></li>
                <li><a href="Ticket.html">My Tickets</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <input type="text" placeholder="Search movies...">
            <button class="profile-btn">
                <img src="profileIcon.jpg">
            </button>
        </div>

        <!-- 🎃 HORROR -->
        <div class="genre-section">
            <h2 class="genre-title">🎃 Horror</h2>
            <div class="movie-row-wrapper">
                <button class="scroll-btn left">&#10094;</button>
                <div class="movie-row">
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/yF1eOkaYvwiORauRCPWznV9xVvi.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>

                </div>
                <button class="scroll-btn right">&#10095;</button>
            </div>
        </div>

        <!-- 😂 COMEDY -->
        <div class="genre-section">
            <h2 class="genre-title">😂 Comedy</h2>
            <div class="movie-row-wrapper">
                <button class="scroll-btn left">&#10094;</button>
                <div class="movie-row">
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg');"></div>
                    <div class="movie-card" style="background-image:url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                </div>
                <button class="scroll-btn right">&#10095;</button>
            </div>
        </div>

        </div>
        </div>

        <script>
        document.querySelectorAll(".movie-row-wrapper").forEach(wrapper => {
            const row = wrapper.querySelector(".movie-row");
            const left = wrapper.querySelector(".left");
            const right = wrapper.querySelector(".right");

            right.onclick = () => row.scrollBy({ left: 300, behavior: "smooth" });
            left.onclick = () => row.scrollBy({ left: -300, behavior: "smooth" });
        });
        </script>

</body>
</html>
