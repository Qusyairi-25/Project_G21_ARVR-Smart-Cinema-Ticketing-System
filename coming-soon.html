<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genres - ARVR Cinema</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
        /* ================= RESET ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #140005;
            color: white;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
        }

        /* ================= LAYOUT ================= */
        .dashboard {
            display: flex;
            height: 100vh;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 220px;
            background: rgba(20, 0, 5, 0.95);
            padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .logo-text {
            color: #ff4d6d;
            margin-bottom: 40px;
            font-size: 26px;
        }

        .menu {
            list-style: none;
        }

        .menu li {
            padding: 12px 0;
            opacity: 0.7;
        }

        .menu a {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 10px 15px;
        }

        .menu li.active a {
            font-weight: bold;
            color: #ff4d4d;
        }

        .menu li a:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        /* ================= MAIN ================= */
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* ================= TOPBAR ================= */
        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .topbar input {
            width: 300px;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #2b0a14;
            color: white;
        }

        .profile-btn {
            background: none;
            border: none;
            cursor: pointer;
        }

        .profile-btn img {
            width: 24px;
        }



        </style>
        </head>

        <body>

        <div class="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo-text">ARVR</h2>

            <ul class="menu">
                <li><a href="homepage.html">Home</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
                <li><a href="genres.html">Genres</a></li>
                <li class="active"><a href="coming-soon.html">Coming Soon</a></li>
                <li><a href="badges.html">Badges</a></li>
                <li><a href="Ticket.html">My Tickets</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <input type="text" placeholder="Search movies...">
            <button class="profile-btn">
                <img src="profileIcon.jpg">
            </button>
        </div>

=

        <script>

        </script>

</body>
</html>
