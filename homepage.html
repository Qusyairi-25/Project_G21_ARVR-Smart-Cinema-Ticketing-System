<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARVR Cinema - Home</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <style>
    /* ================= RESET ================= */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: #140005;
        color: white;
    }

    h1, h2 {
        font-family: 'Playfair Display', serif;
        letter-spacing: 2px;
    }

    /* ================= LAYOUT ================= */
    .dashboard {
        display: flex;
        height: 100vh;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
        width: 220px;
        background: rgba(20, 0, 5, 0.95);
        padding: 30px 20px;
        border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo-text {
        color: #ff4d6d;
        margin-bottom: 40px;
        font-size: 26px;
    }

    .menu {
        list-style: none;
    }

    .menu li {
        padding: 12px 0;
        opacity: 0.7;
        cursor: pointer;
        transition: 0.3s;
    }

    .menu li:hover,
    .menu .active {
        color: #ff4d6d;
        opacity: 1;
    }

    .menu a {
        text-decoration: none;
        color: inherit;
        display: block;
        padding: 10px 15px;
    }

    .menu li {
        list-style: none;
    }

    .menu li.active a {
        font-weight: bold;
        color: #ff4d4d;
    }

    .menu li a:hover {
        background: rgba(255,255,255,0.1);
        border-radius: 8px;
    }

    /* ================= MAIN ================= */
    .main {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
    }

    /* ================= TOPBAR ================= */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .topbar input {
        width: 300px;
        padding: 10px 15px;
        border-radius: 20px;
        border: none;
        background: #2b0a14;
        color: white;
    }

    .profile-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
        transition: 0.3s;
    }

    .profile-btn img {
        width: 24px;
        height: 24px;
    }

    .profile-btn:hover {
        background-color: rgba(255, 255, 255, 0.1);
    }

    /* ================= HERO ================= */
    .hero {
        height: 250px;
        border-radius: 20px;
        background:
            linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.2)),
            url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba') center/cover;
        display: flex;
        align-items: center;
        padding: 30px;
        margin-bottom: 30px;
    }

    .hero-content h1 {
        font-size: 36px;
    }

    .hero-content p {
        margin: 10px 0;
        opacity: 0.85;
    }

    .hero button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, #800020, #ff4d6d);
        color: white;
        cursor: pointer;
    }

    /* ================= SECTION TITLE ================= */
    .section-title {
        margin-bottom: 15px;
    }


    /* ================= MOVIE ROWS ================= */
    .movie-row {
        position: relative;
        display: flex;
        align-items: center;
        margin-bottom: 30px;
    }

    .movies {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        scroll-behavior: smooth;
        padding: 20px;
    }

    .movies::-webkit-scrollbar {
        display: none;
    }

    /* ================= CARD ================= */
    .card {
        min-width: 180px;
        height: 260px;
        border-radius: 15px;
        background-size: cover;
        background-position: center;
        flex-shrink: 0;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: 0.4s ease;
    }

    .card:hover {
        transform: scale(1.12);
        z-index: 10;
        box-shadow: 0 20px 40px rgba(255, 77, 109, 0.4);
    }

    .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        opacity: 0;
        transition: 0.3s;
    }

    .card:hover::before {
        opacity: 1;
    }

    .card::after {
        content: "Book Now";
        position: absolute;
        bottom: 10px;
        width: 100%;
        text-align: center;
        opacity: 0;
        transition: 0.3s;
        font-size: 14px;
    }

    .card:hover::after {
        opacity: 1;
    }

    /* ================= SCROLL BUTTONS ================= */
    .scroll-btn {
        position: absolute;
        background: rgba(0,0,0,0.6);
        border: none;
        color: white;
        font-size: 30px;
        cursor: pointer;
        padding: 10px;
        z-index: 10;
    }

    .scroll-btn.left { left: 0; }
    .scroll-btn.right { right: 0; }

    /* ================= ARROWS (CAROUSEL STYLE) ================= */
        /* wrapper */
        .carousel-wrapper {
        overflow: hidden;
        padding: 50px 20px;
        }

        /* row */
        .carousel {
        display: flex;
        gap: 18px;
        transition: transform 0.6s ease;
        }

       /* ================= MOVIE CARD ================= */
        .movie-card {
            flex: 0 0 auto;
            width: 240px;   /* 🔥 bigger */
            height: 360px;  /* 🔥 taller */
            border-radius: 16px;
            overflow: hidden;
            position: relative;

            transform: scale(1);
            opacity: 0.65;

            transition: transform 0.35s ease, opacity 0.35s ease, box-shadow 0.35s ease;
            cursor: pointer;
        }

        /* image */
        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* overlay */
        .movie-card .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 14px;

            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);

            transform: translateY(30%);
            opacity: 0;
            transition: 0.35s ease;

            font-size: 13px;
        }

        /* hover */
        .movie-card:hover {
            transform: scale(1.08);
            opacity: 1;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.45);
        }

        /* overlay hover */
        .movie-card:hover .overlay {
            transform: translateY(0);
            opacity: 1;
        }

        /* ACTIVE CENTER CARD */
        .movie-card.active {
            transform: scale(1.18);
            opacity: 1;
            z-index: 20;
        }



    </style>
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="homepage.html" class="logo-text">ARVR</a>

        <ul class="menu">
            <li><a href="wishlist.html">Wishlist</a></li>
            <li><a href="genres.html">Genres</a></li>
            <li><a href="coming-soon.html">Coming Soon</a></li>
            <li><a href="promotions.html">Promotions</a></li>
            <li><a href="badges.html">Badges</a></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">
            <input type="text" placeholder="Search movies...">
            
            <button class="profile-btn">
                <img src="profileIcon.jpg" alt="Profile">
            </button>
        </div>

        <!-- HERO -->
        <div class="hero">
            <div class="hero-content">
                <h1>Now Showing</h1>
                <p>Book your favorite movies instantly.</p>
                <button>Book Now</button>
            </div>
        </div>

        <!-- ================= POPULAR MOVIES AUTO SCROLL ================= -->
        <h2 class="section-title">🔥 Trending Now</h2>

            <div class="carousel-wrapper" id="wrapper">
            <div class="carousel" id="carousel">


            <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">
            <div class="overlay">
                <h3>Interstellar</h3>
                <p>⭐ 8.7 | 2h 29m</p>
                <button>Book Now</button>
            </div>
            </div>

            <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
            <div class="overlay">
                <h3>Ant-Man</h3>
                <p>⭐ 7.3 | 2h 5m</p>
                <button>Book Now</button>
            </div>
            </div>

            <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/1BIoJGKbXjdFDAqUEiA2VHqkK1Z.jpg">
            <div class="overlay">
                <h3>Ant-Man</h3>
                <p>⭐ 7.3 | 2h 5m</p>
                <button>Book Now</button>
            </div>
            </div>

        </div>
        </div>



        <!-- ================= ONLY IN CINEMA ================= -->
        <h2 class="section-title">Only in Cinema</h2>

        <div class="movie-row">
            <button class="scroll-btn left">&#10094;</button>

            <div class="movies">

            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg');"></div>
            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg');"></div>
            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/1BIoJGKbXjdFDAqUEiA2VHqkK1Z.jpg');"></div>
            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg');"></div>
            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg');"></div>
            <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/yF1eOkaYvwiORauRCPWznV9xVvi.jpg');"></div>

                <!-- unlimited -->
            </div>

            <button class="scroll-btn right">&#10095;</button>
        </div>


        <!-- ================= NEW & UPCOMING ================= -->
        <h2 class="section-title">New & Upcoming</h2>

        <div class="movie-row">
            <button class="scroll-btn left">&#10094;</button>

            <div class="movies">
                <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg');"></div>
                <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg');"></div>
                <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg');"></div>
                <div class="card" style="background-image: url('https://image.tmdb.org/t/p/w500/1BIoJGKbXjdFDAqUEiA2VHqkK1Z.jpg');"></div>

                <!-- unlimited -->
            </div>

            <button class="scroll-btn right">&#10095;</button>
        </div>

        <script>
        const rows = document.querySelectorAll(".movie-row");

        rows.forEach(row => {
            const container = row.querySelector(".movies");
            const leftBtn = row.querySelector(".left");
            const rightBtn = row.querySelector(".right");

            rightBtn.addEventListener("click", () => {
                container.scrollBy({ left: 300, behavior: "smooth" });
            });

            leftBtn.addEventListener("click", () => {
                container.scrollBy({ left: -300, behavior: "smooth" });
            });
        });

        /*Popular movie control bar auto animations*/

       const carousel = document.getElementById("carousel");
        let cards = document.querySelectorAll(".movie-card");

        let index = 0;

        /* STEP 1: CLONE FIRST FEW CARDS */
        const clones = [...cards].map(card => card.cloneNode(true));
        clones.forEach(clone => carousel.appendChild(clone));

        cards = document.querySelectorAll(".movie-card"); // reselect after cloning

        const cardWidth = cards[0].offsetWidth + 18;

        /* STEP 2: MOVE FUNCTION (NO RESET JUMP) */
        function moveCarousel() {
            index++;

            carousel.style.transition = "transform 0.6s ease";
            carousel.style.transform = `translateX(${-index * cardWidth}px)`;

            updateActive();

            /* STEP 3: RESET SILENTLY AT LOOP END */
            if (index === cards.length / 2) {
                setTimeout(() => {
                    carousel.style.transition = "none";
                    index = 0;
                    carousel.style.transform = `translateX(0px)`;
                    updateActive();
                }, 600);
            }
        }

        /* ACTIVE CARD HIGHLIGHT */
        function updateActive() {
            cards.forEach((card, i) => {
                card.classList.remove("active");

                if (i === index) {
                    card.classList.add("active");
                }
            });
        }

        /* START LOOP */
        setInterval(moveCarousel, 2500);

        updateActive();

        </script>


    </div>

</div>

</body>
</html>
