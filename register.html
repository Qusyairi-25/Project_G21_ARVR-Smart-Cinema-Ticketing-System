<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Booking - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="overlay">

            <div class="brand">
                <img src="ARVR MOVIE LOGO.png" alt="Logo" class="logo">

                <div class="brand-text">
                    <h1 class="site-name">ARVR Movie</h1>
                    <p class="tagline">Your cinematic ticket experience</p>
                </div>
            </div>

            <div class="hero-text">
                <h1>Join the Front Row</h1>
                <p>Book your perfect cinema experience</p>
            </div>

        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="container">
            <h2>Create Account</h2>

            <form>

                <div class="input-group">
                    <input type="text" required>
                    <label>Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="input-group">
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <div class="input-group">
                    <input type="password" required>
                    <label>Confirm Password</label>
                </div>

                <button type="submit">Register!</button>

            </form>

            <div class="footer">
                Already a member? <a href="login.html">Login</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
