<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <!-- Page-specific tweak -->
    <style>
        .container {
            width: 380px;
            animation: fadeIn 0.8s ease;
        }

        button {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="overlay">

            <div class="brand">
                <img src="ARVR MOVIE LOGO.png" alt="Logo" class="logo">

                <div class="brand-text">
                    <h1 class="site-name">ARVR Movie</h1>
                    <p class="tagline">Your cinematic ticket experience</p>
                </div>
            </div>

            <div class="hero-text">
                <h1>Welcome Back</h1>
                <p>Step into your cinematic experience</p>
            </div>

        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="container">

            <h2>Login</h2>

            <form>

                <div class="input-group">
                    <input type="text" required>
                    <label>Username / Email</label>
                </div>

                <div class="input-group">
                    <input type="password" required>
                    <label>Password</label>
                </div>

                 <div class="form-options">
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>

                <button type="submit">Login</button>

                <div class="footer">
                    <p>Don't have an account? <a href="register.html">Register</a></p>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
